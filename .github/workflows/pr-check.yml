name: PR Check
permissions:
  contents: read
  pull-requests: write
on:
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore csharp-ui-demo.sln

      - name: Build
        run: dotnet build csharp-ui-demo.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test csharp-ui-demo.sln --configuration Release --no-build
